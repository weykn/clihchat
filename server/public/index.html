<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>clih chat log</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      color: #cbd5e1;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      min-height: 100vh;
      padding: 0 1.5rem 1.5rem;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #0f172a;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid #1e293b;
      padding: 1.5rem 0 0.75rem;
    }

    h1 { color: #5EEAD4; font-size: 1.1rem; letter-spacing: 0.05em; }

    #status { color: #475569; font-size: 0.75rem; }

    .dl-btn {
      margin-left: auto;
      padding: 0.3rem 0.85rem;
      background: #5EEAD4;
      color: #0f172a;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }
    .dl-btn:hover { background: #99f6e4; }

    .verbose-toggle {
      font-size: 0.75rem;
      color: #64748B;
      text-decoration: none;
      white-space: nowrap;
    }
    .verbose-toggle:hover { color: #94a3b8; }

    #log { display: flex; flex-direction: column; gap: 0.15rem; }

    .entry { display: flex; gap: 1.25rem; padding: 0.2rem 0; }

    .ts {
      color: #334155;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 8ch;
    }

    .line { word-break: break-word; }
    .c-from   { color: #5EEAD4; }
    .c-arrow  { color: #64748B; }
    .c-to     { color: #F472B6; }
    .c-msg    { color: #E2E8F0; }
    .c-hello  { color: #4ADE80; }
    .c-bye    { color: #F87171; }
    .c-back   { color: #FB923C; }
    .c-dim    { color: #475569; }
  </style>
</head>
<body>
  <header>
    <h1>clih chat log</h1>
    <span id="status">connecting…</span>
    <a id="toggle" class="verbose-toggle" href="#"></a>
    <a class="dl-btn" href="/download">⬇ download mod</a>
  </header>
  <div id="log"></div>

  <script>
    const logEl  = document.getElementById('log');
    const status = document.getElementById('status');
    const toggle = document.getElementById('toggle');
    const verbose = new URLSearchParams(location.search).get('all') === '1';

    toggle.textContent = verbose ? '— hide system events' : '+ show all events';
    toggle.href = verbose ? location.pathname : '?all=1';

    let count = 0;

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function fmtTime(ts) {
      return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function renderEntry(r) {
      const div = document.createElement('div');
      div.className = 'entry';
      const ts = `<span class="ts">${fmtTime(r.ts)}</span>`;

      if (r.type === 'hello') {
        div.innerHTML = ts +
          `<span class="line"><span class="c-dim">›</span> ` +
          `<span class="c-hello">${esc(r.name)}</span>` +
          `<span class="c-dim"> connected</span></span>`;

      } else if (r.type === 'disconnect') {
        div.innerHTML = ts +
          `<span class="line"><span class="c-dim">‹</span> ` +
          `<span class="c-bye">${esc(r.name)}</span>` +
          `<span class="c-dim"> disconnected</span></span>`;

      } else if (r.type === 'fallback') {
        div.innerHTML = ts +
          `<span class="line"><span class="c-back">⚡ fallback</span> ` +
          `<span class="c-from">${esc(r.from)}</span>` +
          `<span class="c-arrow"> → </span>` +
          `<span class="c-to">${esc(r.to)}</span>` +
          `<span class="c-arrow">: </span>` +
          `<span class="c-msg">${esc(r.msg)}</span></span>`;

      } else {
        // whisper (type === 'whisper' or old format without type)
        div.innerHTML = ts +
          `<span class="line">` +
          `<span class="c-from">${esc(r.from)}</span>` +
          `<span class="c-arrow"> -&gt; </span>` +
          `<span class="c-to">${esc(r.to)}</span>` +
          `<span class="c-arrow">: </span>` +
          `<span class="c-msg">${esc(r.msg)}</span>` +
          `</span>`;
      }
      return div;
    }

    async function poll() {
      try {
        const res  = await fetch('/chats' + (verbose ? '?all=1' : ''));
        const data = await res.json();
        if (data.length > count) {
          for (let i = count; i < data.length; i++) {
            logEl.appendChild(renderEntry(data[i]));
          }
          count = data.length;
          window.scrollTo(0, document.body.scrollHeight);
        }
        status.textContent = `${count} event${count === 1 ? '' : 's'} · updated ${new Date().toLocaleTimeString()}`;
      } catch {
        status.textContent = 'relay unreachable';
      }
    }

    poll();
    setInterval(poll, 2000);
  </script>
</body>
</html>
